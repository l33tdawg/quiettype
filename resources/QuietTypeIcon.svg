<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">QuietType app icon</title>
  <desc id="desc">A rounded QuietType app icon with a speech bubble Q mark and vertical audio waveform.</desc>

  <defs>
    <linearGradient id="tile" x1="180" y1="120" x2="820" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F0ED"/>
    </linearGradient>
    <linearGradient id="ink" x1="320" y1="250" x2="730" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#334047"/>
      <stop offset="1" stop-color="#111415"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#tile)"/>
  <rect x="1" y="1" width="1022" height="1022" rx="227" fill="none" stroke="#DCDAD5" stroke-opacity="0.55" stroke-width="2"/>

  <g filter="url(#soft-shadow)">
