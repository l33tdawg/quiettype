<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">QuietType app icon</title>
  <desc id="desc">A quiet microphone and text cursor mark inside a private local shield.</desc>
  <defs>
    <linearGradient id="bg" x1="184" y1="112" x2="840" y2="912" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF7F4"/>
      <stop offset="0.48" stop-color="#D7ECE5"/>
      <stop offset="1" stop-color="#BBDDD2"/>
    </linearGradient>
    <linearGradient id="shield" x1="302" y1="196" x2="722" y2="826" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C302A"/>
      <stop offset="1" stop-color="#061C19"/>
    </linearGradient>
    <linearGradient id="voice" x1="318" y1="268" x2="705" y2="746" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72F0C8"/>
      <stop offset="1" stop-color="#37B8E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#06241F" flood-opacity="0.24"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <path d="M512 118c130 78 242 98 332 101 10 167-20 303-91 408-56 84-136 151-241 205-105-54-185-121-241-205-71-105-101-241-91-408 90-3 202-23 332-101Z" fill="url(#shield)" filter="url(#softShadow)"/>
  <path d="M512 166c102 56 194 77 276 85 3 135-25 247-84 334-45 66-109 121-192 166-83-45-147-100-192-166-59-87-87-199-84-334 82-8 174-29 276-85Z" fill="#0D3A34" opacity="0.56"/>

  <g filter="url(#innerGlow)">
    <rect x="408" y="274" width="208" height="306" rx="104" fill="url(#voice)"/>
    <rect x="458" y="224" width="108" height="332" rx="54" fill="#EFFFF9" opacity="0.94"/>
    <rect x="494" y="300" width="36" height="178" rx="18" fill="#07302A"/>
    <path d="M340 468c0 95 77 172 172 172s172-77 172-172" fill="none" stroke="#EFFFF9" stroke-width="48" stroke-linecap="round"/>
    <path d="M512 640v96" fill="none" stroke="#EFFFF9" stroke-width="48" stroke-linecap="round"/>
    <path d="M430 736h164" fill="none" stroke="#EFFFF9" stroke-width="48" stroke-linecap="round"/>
  </g>

  <path d="M704 338v348" fill="none" stroke="#72F0C8" stroke-width="34" stroke-linecap="round"/>
  <path d="M654 338h100M654 686h100" fill="none" stroke="#72F0C8" stroke-width="34" stroke-linecap="round"/>

  <path d="M324 772c60 48 123 82 188 112 65-30 128-64 188-112" fill="none" stroke="#EFFFF9" stroke-width="22" stroke-linecap="round" opacity="0.34"/>
</svg>
