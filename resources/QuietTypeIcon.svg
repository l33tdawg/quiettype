    <ellipse cx="512" cy="487" rx="203" ry="177" fill="#F7F7F5"/>
  </g>

  <g fill="url(#ink)">
    <rect x="336" y="451" width="25" height="72" rx="12.5"/>
    <rect x="383" y="411" width="25" height="152" rx="12.5"/>
    <rect x="430" y="375" width="25" height="224" rx="12.5"/>
    <rect x="477" y="425" width="25" height="124" rx="12.5"/>
    <rect x="524" y="356" width="25" height="262" rx="12.5"/>
    <rect x="571" y="405" width="25" height="164" rx="12.5"/>
    <rect x="618" y="444" width="25" height="86" rx="12.5"/>
    <rect x="665" y="472" width="25" height="30" rx="12.5"/>
